<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HybridMem-RAG</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .status.ok {
      background: #d4edda;
      color: #155724;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    .stats {
      font-size: 13px;
      color: #666;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 4px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div id="status" class="status">检查中...</div>
  <div class="stats">
    <div>离线队列: <span id="queue">0</span></div>
  </div>
  <button id="retry">重试离线队列</button>
  <script src="popup.js"></script>
</body>
</html>
